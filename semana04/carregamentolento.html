


<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregamento Lento</title>

    <link rel="stylesheet" href="css/carregamentolento.css">

    <script src="js/carregamentolento.js" defer></script>
</head>

<body>

<header>

        height="600"

        src="https://picsum.photos/400/600?random=4"
        alt="Paisagem 4"
        width="400"
        height="600"
        loading="lazy">

    <img
        src="https://picsum.photos/400/600?random=5"
        alt="Paisagem 5"
        width="400"
        height="600"
        loading="lazy">

    <img
        src="https://picsum.photos/400/600?random=6"

        height="600"

</main>

<footer>
    <p>&copy; <span id="year"></span> Seu Nome</p>

</footer>

</body>
</html>
